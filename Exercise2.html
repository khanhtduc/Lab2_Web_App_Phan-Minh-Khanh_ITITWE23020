<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Exercise2</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
</head>
<body class="bg-light">
    <div class="container mt-5 mb-5 p-4 bg-white rounded shadow" style="max-width: 500px;">
        <div class="text-center mb-4">
            <img src="International Unversity.jpg" alt="International University" class="mb-2" style="max-width: 120px;">
        </div>
        <h2 class="text-success fw-bold">Survey</h2>
        <p>If you have a moment, we'd appreciate it if you would fill out this survey.</p>
        <form>
            <h4 class="text-success mt-4 mb-3">Your information:</h4>
            <div class="mb-3 row align-items-center">
                <label for="fname" class="col-sm-4 col-form-label fw-bold">First Name</label>
                <div class="col-sm-8">
                    <input type="text" class="form-control" id="fname" name="fname" required>
                </div>
            </div>
            <div class="mb-3 row align-items-center">
                <label for="lname" class="col-sm-4 col-form-label fw-bold">Last Name</label>
                <div class="col-sm-8">
                    <input type="text" class="form-control" id="lname" name="lname" required>
                </div>
            </div>
            <div class="mb-3 row align-items-center">
                <label for="email" class="col-sm-4 col-form-label fw-bold">Email</label>
                <div class="col-sm-8">
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
            </div>
            <div class="mb-4 row align-items-center">
                <label for="dob" class="col-sm-4 col-form-label fw-bold">Date of Birth</label>
                <div class="col-sm-8">
                    <input type="date" class="form-control" id="dob" name="dob" required>
                </div>
            </div>

            <h5 class="text-success mb-3">How did you hear about us?</h5>
            <div class="mb-4 ms-2">
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="referral" id="search" value="Search engine" required>
                    <label class="form-check-label" for="search">Search engine</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="referral" id="word" value="Word of mouth">
                    <label class="form-check-label" for="word">Word of mouth</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="referral" id="social" value="Social Media">
                    <label class="form-check-label" for="social">Social Media</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="referral" id="other" value="Other">
                    <label class="form-check-label" for="other">Other</label>
                </div>
            </div>

            <h5 class="text-success mb-3">Would you like to receive announcements about new CDs and special offers?</h5>
            <div class="mb-2 ms-2">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="announce1" name="announce1" value="yes_like">
                    <label class="form-check-label" for="announce1">YES, I'd like that.</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="announce2" name="announce2" value="yes_email">
                    <label class="form-check-label" for="announce2">YES, please send me email announcements.</label>
                </div>
            </div>

            <div class="mb-4 ms-2">
                <label for="contact" class="form-label">Please contact me by:</label>
                <select class="form-select w-auto d-inline-block" id="contact" name="contact">
                    <option value="email or postalmail">Email or postal mail</option>
                    <option value="email">Email only</option>
                    <option value="postal mail">Postal mail only</option>
                </select>
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-secondary px-4">Submit</button>
            </div>
        </form>
    </div>

</body>
</html>
